<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Formulario Restaurante')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<main class="container flex-grow-1 my-4">
    <h1 class="mb-0">
        <i class="fa-solid fa-utensils text-primary me-2"></i>Formulario pedidos
    </h1>
    <form th:action="@{/pedidos}" method="post" th:object="${pedido}">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{restaurante}">
        <div class="mb-3">
            <label for="numeroTabla" class="form-label">Mesa</label>
            <input type="number" class="form-control" id="numeroTabla" th:field="*{numeroTabla}" min="1" max="30" required></label>
        </div>

        <div class="mb-3">
            <label for="numeroPersonas" class="form-label">Número comensales</label>
            <input type="number" class="form-control" id="numeroPersonas" th:field="*{numeroPersonas}" min="1" max="30" required></label>
        </div>

        <div class="mb-3">
            <label for="sugerenciasUsuarios" class="form-label">Observaciones/Alergias/Comentarios</label>
            <textarea class="form-control" id="sugerenciasUsuarios" th:field="*{sugerenciasUsuarios}" rows="1" maxlength="500"></textarea>
        </div>

        <button type="submit" class="btn btn-success">
            <i class="fa-solid fa-floppy-disk"></i> Guardar
        </button>
        <a th:href="@{/Platos}" class="btn btn-secondary">Cancelar</a>
    </form>
</main>
<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>


</body>
</html>
