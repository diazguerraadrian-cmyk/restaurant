<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Reseñas')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">

    <h1 class="mb-4">
        <i class="fa-regular fa-comments text-primary me-2"></i> Opiniones de clientes
    </h1>

    <div th:if="${reviews.isEmpty()}" class="alert alert-light border">
        Aún no hay reseñas.
    </div>

    <div class="row row-cols-1 row-cols-md-2 g-3">
        <div class="col" th:each="review : ${reviews}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title mb-0" th:text="${review.title}">Título</h5>
                        <span class="badge bg-warning text-dark">
                            <i class="fa-solid fa-star me-1"></i>
                            <span th:text="${review.calificacion + ' / 5'}"></span>
                        </span>
                    </div>
                    <p class="card-text" th:text="${review.descripcion}">Descripción</p>
                    <p class="text-muted small mb-0">
                        <i class="fa-regular fa-calendar me-1"></i>
                        <span th:text="${review.fechacreada}"></span>
                    </p>
                </div>
                <div class="card-footer bg-transparent small">
                    <div th:if="${review.restaurante != null}">
                        <i class="fa-solid fa-store text-primary me-1"></i>
                        <a th:href="@{/Restaurantes/{id}(id=${review.restaurante.id})}"
                           th:text="${review.restaurante.nombre}">Restaurante</a>
                    </div>
                    <div th:if="${review.plato != null}">
                        <i class="fa-solid fa-utensils text-primary me-1"></i>
                        <a th:href="@{/Platos/{id}(id=${review.plato.id})}"
                           th:text="${review.plato.nombre}">Plato</a>
                        <span th:if="${review.plato.restaurante != null}"
                              class="text-muted">
                            — en
                            <a th:href="@{/Restaurantes/{id}(id=${review.plato.restaurante.id})}"
                               th:text="${review.plato.restaurante.nombre}">Restaurante</a>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>
</body>
</html>
