<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Detalle Plato')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">

    <!-- Card con los datos del plato -->
    <div class="card shadow-sm">
        <div class="card-body">
            <h1 class="card-title mb-3" th:text="'Plato ' + ${plato.id}">Plato</h1>

            <dl class="row mb-0">
                <dt class="col-sm-3"><i class="fa-solid fa-tag me-1"></i> Nombre</dt>
                <dd class="col-sm-9" th:text="${plato.nombre}"></dd>

                <dt class="col-sm-3"><i class="fa-solid fa-euro-sign me-1"></i> Precio</dt>
                <dd class="col-sm-9" th:text="${plato.precio != null ? plato.precio + ' €' : 'Sin precio'}"></dd>

                <dt class="col-sm-3"><i class="fa-regular fa-pen-to-square me-1"></i> Descripción</dt>
                <dd class="col-sm-9" th:text="${plato.descripcion != null ? plato.descripcion : 'Sin descripción'}"></dd>

                <dt class="col-sm-3"><i class="fa-solid fa-list me-1"></i> Tipo</dt>
                <dd class="col-sm-9">
                    <span th:switch="${plato.tipoPlato}">
                        <span class="badge bg-success" th:case="${T(com.example.restaurant.model.TipoPlato).PRIMERO}">🥬 Primer plato</span>
                        <span class="badge bg-primary" th:case="${T(com.example.restaurant.model.TipoPlato).SEGUNDO}">🐟 Segundo Plato</span>
                        <span class="badge bg-warning text-dark" th:case="${T(com.example.restaurant.model.TipoPlato).POSTRE}">🍦 Tercer Plato</span>
                        <span class="badge bg-secondary" th:case="*">No definido</span>
                    </span>
                </dd>
            </dl>
        </div>

        <div class="card-footer bg-transparent" th:if="${plato.restaurante != null}">
            <i class="fa-solid fa-store text-primary me-1"></i>
            Este plato pertenece al restaurante
            <a class="fw-semibold"
               th:href="@{/Restaurantes/{id}(id=${plato.restaurante.id})}"
               th:text="${plato.restaurante.nombre}"></a>
        </div>
    </div>

    <!-- Opiniones del plato -->
    <h2 class="mt-5">
        <i class="fa-regular fa-comments text-primary me-2"></i> Opiniones sobre este plato
    </h2>

    <div th:if="${reviews.isEmpty()}" class="alert alert-light border">
        <i class="fa-regular fa-face-smile me-1"></i>
        Nadie ha comentado todavía, sé el primero en escribir una opinión.
    </div>

    <div class="row row-cols-1 row-cols-md-2 g-3" th:unless="${reviews.isEmpty()}">
        <div class="col" th:each="review : ${reviews}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${review.title}">Título</h5>
                    <p class="card-text" th:text="${review.descripcion}">Descripción</p>
                    <span class="badge bg-warning text-dark">
                        <i class="fa-solid fa-star me-1"></i>
                        <span th:text="${review.calificacion + ' / 5'}"></span>
                    </span>
                </div>
                <div class="card-footer text-muted small bg-transparent">
                    <i class="fa-regular fa-calendar me-1"></i>
                    <span th:text="${review.fechacreada}"></span>
                </div>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
