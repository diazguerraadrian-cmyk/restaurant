<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Crear cuenta')}"></head>
<body class="d-flex align-items-center py-4 bg-light min-vh-100">

<main class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <form th:action="@{/login}" method="post" class="card shadow-sm p-4" th:object="${user}">

                <!-- LOGO Y TITULO -->
                <div class="text-center mb-3">
                    <img th:src="@{/images/logo.png}" alt="Logo" class="mb-2 rounded-3" style="width:150px;">
                    <h1 class="h3 mt-3 fw-normal">Entra con tu cuenta</h1>
                </div>

                <div th:if="${error}" class="alert alert-danger" th:text=${error}></div>

                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="username"
                           placeholder="pepe666" required name="username" min="3" maxlength="100">
                    <label for="username">Username</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" name="password"
                           class="form-control" id="password"
                           required minlength="4">
                    <label for="password">Contraseña</label>
                </div>

                <button type="submit" class="btn btn-success">Entrar</button>

                <p class="mt-3 text-center small">¿No tienes cuenta?
                    <a th:href="@{/register}">Crear cuenta</a>.
                </p>

            </form>
        </div>
    </div>
</main>

<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
