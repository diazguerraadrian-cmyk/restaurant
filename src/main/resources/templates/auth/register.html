<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Crear cuenta')}"></head>
<body class="d-flex align-items-center py-4 bg-light min-vh-100">

<main class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <form th:action="@{/register}" method="post" class="card shadow-sm p-4" th:object="${user}">

                <!-- LOGO Y TITULO -->
                <div class="text-center mb-3">
                    <img th:src="@{/images/logo.png}" alt="Logo" class="mb-2 rounded-3" style="width:150px;">
                    <h1 class="h3 mt-3 fw-normal">Crear cuenta</h1>
                </div>

                <div th:if="${param.error}" class="alert alert-danger">Credenciales incorrectas.</div>
                <div th:if="${param.logout}" class="alert alert-success">Sesión cerrada correctamente, hasta pronto.</div>
                <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="username"
                           placeholder="pepe666" required th:field="*{username}" min="3" maxlength="100">
                    <label for="username">Username</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email"
                           placeholder="pepe@gmail.com" required th:field="*{email}">
                    <label for="email">Email</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" th:field="*{password}"
                           class="form-control" id="password"
                           required minlength="4">
                    <label for="password">Contraseña</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" th:field="*{passwordConfirm}"
                           class="form-control" id="passwordConfirm"
                           required minlength="4">
                    <label for="passwordConfirm">Repite la contraseña</label>
                </div>

                <button type="submit" class="btn btn-success">Crear cuenta</button>

                <p class="mt-3 text-center small">¿Ya tienes cuenta?
                    <a th:href="@{/login}">Inicia sesión</a>.
                </p>

            </form>
        </div>
    </div>
</main>

<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
