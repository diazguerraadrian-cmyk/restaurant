<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/head :: head('Listado Pedidos')}"></head>

<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">

    <h1 class="mb-3">
        <i class="fa-solid fa-user texty-primary me-2"></i>
        <span th:text="${'Usuario: ' + user.id}"></span>
    </h1>
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <dl class="row mb-0">

                <dt class="col-sm-3">ID</dt>
                <dd class="col-sm-9" th:text="${user.id}"></dd>

                <dt class="col-sm-3">Username</dt>
                <dd class="col-sm-9" th:text="${user.username}"></dd>

                <dt class="col-sm-3">Email</dt>
                <dd class="col-sm-9" th:text="${user.email}"></dd>

                <dt class="col-sm-3">Rol</dt>
                <dd class="col-sm-9" th:text="${user.role}"></dd>
            </dl>
        </div>
        <div class="card-footer text-end">
            <a th:href="@{/admin/users}"
               class="btn btn-sm btn-outline-secondary">
                <i class="fa-regular fa-eye me-1"></i> Volver
            </a>

            <a th:href="@{/admin/users/edit/{id}(id=${user.id})}"
               class="btn btn-sm btn-outline-success">
                <i class="fa-regular fa-pencil me-1"></i> Editar
            </a>

            <a th:href="@{/admin/users/deactivate/{id}(id=${user.id})}"
               class="btn btn-sm btn-outline-danger">
                <i class="fa-regular fa-trash me-1"></i> Desactivar
            </a>
        </div>
    </div>
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card-body">
                <i class="fa-solid"></i>
                <h3></h3>
                <p></p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <i class="fa-solid fa-star text-warning"></i>
                    <h3 class="card-title my-2" th:text="${usuarioStats.countReviews()}"></h3>
                    <p class="card-text text-muted">Reseñas escritas</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <i class="fa-solid fa-star text-warning"></i>
                    <h3 class="card-title my-2" th:text="${usuarioStats.countPedidos()}"></h3>
                    <p class="card-text text-muted">Pedidos realizados</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <i class="fa-solid fa-star text-warning"></i>
                    <h3 class="card-title my-2">
                        <span th:text="${#numbers.formatDecimal(usuarioStats.moneySpent(), 1, 2)}"></span> €
                    </h3>
                    <p class="card-text text-muted">Total gastado</p>
                </div>
            </div>
        </div>
    </div>
    <h2 class="mt-5">
        <i class="fa-regular fa-comments text-primary me-2"></i> Reviews de este usuario
    </h2>

    <div th:if="${userStats.reviews().isEmpty()}" class="alert alert-light border">
        <i class="fa-regular fa-face-smile me-1"></i>
        Este usuario no ha escrito ninguna reseña todavía.
    </div>

    <div class="row row-cols-1 row-cols-md-2 g-3" th:unless="${userStats.reviews().isEmpty()}">
        <div class="col" th:each="review : ${userStats.reviews}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${review.title}">Título</h5>
                    <p class="card-text" th:text="${review.descripcion}">Descripción</p>
                    <span class="badge bg-warning text-dark">
                        <i class="fa-solid fa-star me-1"></i>
                        <span th:text="${review.calificacion + ' / 5'}"></span>
                    </span>
                </div>
                <div class="card-footer text-muted small bg-transparent">
                    <i class="fa-regular fa-calendar me-1"></i>
                    <span th:text="${review.fechacreada}"></span>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>
</body>
</html>
