<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurante</title>
</head>
<body>

<h1 th:text="${restaurante.nombre}"></h1>

<p th:text="${restaurante.precioMedio != null ? restaurante.precioMedio + '€ (EUR)' : 'Sin precio'}"></p>


<p th:if="${restaurante.numero_empleados != null}" th:text="${restaurante.numero_empleados + 'empleados'}"></p>
<p th:unless="${restaurante.numero_empleados != null}">Sin empleados</p>

<p th:if="${restaurante.activo}" style="color:green;">Abierto</p>
<p th:unless="${restaurante.activo}" style="color:red;">Cerrado</p>

<h2>Carta de platos</h2>
<p th:text="${platos.size()} + ' platos'"></p>

<table>
    <thead>
        <tr>
            <th>Id</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Precio</th>
            <th>Tipo</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="plato : ${platos}">
            <td th:text="${plato.id}"></td>
            <td th:text="${plato.nombre}"></td>
            <td th:text="${plato.descripcion}"></td>
            <td th:text="${plato.precio}"></td>
            <td th:text="${plato.tipoPlato.label}"></td>
            <td>
                <!-- Botones con acciones: Ver, Agregar a pedido, Desactivar, Borrar -->
                <!-- Ver plato -->
                <a th:href="@{/plato/{id}(id=${plato.id})}">Ver plato</a>
            </td>
        </tr>
    </tbody>
</table>
<!-- resto de atributos de restaurante -->

<!-- listado de platos -->

</body>
</html>
