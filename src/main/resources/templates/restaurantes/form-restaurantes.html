<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/head :: head('Formulario Restaurante')}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1 my-4">

    <h1 class="mb-0">
        <i class="fa-solid fa-utensils text-primary me-2"></i>Formulario restaurante
    </h1>

    <!-- TODO formulario para crear o editar un restaurante -->
    <form th:action="@{/restaurantes}" method="post" th:object="${restaurante}">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombre" th:field="*{nombre}">
        </div>

        <div class="mb-3">
            <label for="precioMedio" class="form-label">Precio medio</label>
            <input type="number" class="form-control" id="precioMedio" th:field="*{precioMedio}" step="0.01" min="0">
        </div>

        <div class="mb-3 form-check form-switch">
            <input type="checkbox" class="form-check-input" id="activo" role="switch" th:field="*{activo}">
            <label for="activo" class="form-check-label">Restaurante activo</label>
        </div>

        <button type="submit" class="btn btn-success"><i class="fa-solid fa-floppy-disk"></i>Guardar</button>

        <a th:href="@{/restaurantes}" class="btn btn-secondary">Cancelar</a>


    </form>

</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>
</body>
</html>
