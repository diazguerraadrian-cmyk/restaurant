<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Restaurantes')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0" th:text="${titulo}">Restaurantes</h1>
        <span class="badge bg-secondary fs-6" th:text="|${numRestaurantes} resultados|">0 resultados</span>
        <a th:href="@{restaurantes/new}" class="btn btn-primary btn-sm mb-2"><i class="fa-solid fa-plus"></i>Crear restaurante</a>
    </div>
    <div class="mb-3">
        <h5>Filtros rápidos</h5>
        <a th:href="@{/restaurantes}" class="btn btn-sm btn-secondary">Todos</a>
        <a th:href="@{/restaurantes(tipoComida='SPANISH')}" class="btn btn-sm btn-secondary">Comida española</a>
        <a th:href="@{/restaurantes(tipoComida='JAPANESE')}" class="btn btn-sm btn-secondary">Comida japonesa</a>
        <a th:href="@{/restaurantes(precio=15)}" class="btn btn-sm btn-secondary">Hasta 15 €</a>
        <a th:href="@{/restaurantes(precio=30)}" class="btn btn-sm btn-secondary">Hasta 30 €</a>
        <a th:href="@{/restaurantes(titulo='pizza')}" class="btn btn-sm btn-secondary">Pizza</a>
        <a th:href="@{/restaurantes(titulo='hamburguesa')}" class="btn btn-sm btn-secondary">Hamburguesa</a>
        <a th:href="@{/restaurantes(titulo='paella')}" class="btn btn-sm btn-secondary">Paella</a>
    </div>

    <div class="mb-3">
        <h5>Búsqueda avanzada</h5>
        <form th:action="@{/restaurantes}" method="get" class="row align-items-end">
            <div class="col-auto">
                <label class="form-label">Título</label>
                <input type="text" name="titulo" class="form-control" placeholder="Busca por titulo..." th:value="${param.titulo}">
            </div>

            <div class="col-auto">
                <label class="form-label form-label-sm">Precio máx.</label>
                <input type="number" min="10" step="1" name="precio" class="form-control form-control-sm" th:value="${param.precio}">
            </div>

            <div class="col-auto">
                <label class="form-label form-label-sm">Tipo comida</label>
                <select name="tipoComida" class="form-select form-select-sm">
                    <option value="" th:selected="${param.tipoComida == null}">Todas</option>
                    <option value="SPANISH" th:selected="${param.tipoComida != null and param.tipoComida[0] == 'SPANISH'}">Española</option>
                    <option value="JAPANESE" th:selected="${param.tipoComida != null and param.tipoComida[0] == 'JAPANESE'}">Japonesa</option>
                </select>
            </div>

            <div class="col-auto">
                <button type="submit" class="btn btn-primary btn-sm"><i class="fa-solid fa-magnifying-glass"></i>Buscar</button>
                <a th:href="@{/restaurantes}" class="btn btn-danger btn-sm"><i class="fa-solid fa-broom"></i>Limpiar filtros</a>
            </div>
        </form>
    </div>
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3">
        <div class="col" th:each="restaurant : ${restaurantes}">
            <div class="card card-restaurant h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="fa-solid fa-store text-primary me-2"></i>
                        <span th:text="${restaurant.nombre}">Nombre</span>
                    </h5>
                    <p class="card-text">
                        <span class="badge bg-success">
                            <i class="fa-solid fa-euro-sign me-1"></i>
                            <span th:text="${restaurant.precioMedio}">0</span>
                        </span>
                    </p>
                </div>
                <div class="card-footer bg-transparent border-0 pt-0">
                    <a th:href="@{/Restaurantes/{id}(id=${restaurant.id})}"
                       class="btn btn-outline-primary btn-sm w-100">
                        <i class="fa-regular fa-eye me-1"></i> Ver restaurante
                    </a>
                    <a th:href="@{/Restaurantes/desactivar/{id}(id=${restaurant.id})}"
                       class="btn btn-warning btn-sm mt-2">
                        <i class="fa-solid fa-ban me-1"></i> Desactivar restaurante
                    </a>
                    <a th:href="@{/Restaurantes/desactivar/{id}(id=${restaurant.id})}"
                       class="btn btn-success btn-sm mt-2">
                        <i class="fa-solid fa-pencil me-1"></i> Editar restaurante
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>


</body>

</html>
